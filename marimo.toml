[ai.custom_providers]

[ai.models]
displayed_models = []
custom_models = []

[server]
browser = "default"
follow_symlink = false

[language_servers.pylsp]
enable_pydocstyle = false
enabled = true
enable_pylint = false
enable_flake8 = false
enable_mypy = true
enable_ruff = true
enable_pyflakes = false

[formatting]
line_length = 88

[keymap]
preset = "default"

[keymap.overrides]

[experimental]
external_agents = true
server_side_pdf_export = true
rtc_v2 = true

[save]
autosave_delay = 1000
autosave = "after_delay"
format_on_save = true

[snippets]
custom_paths = []
include_default_snippets = true

[display]
default_table_page_size = 20
code_editor_font_size = 14
theme = "system"
cell_output = "below"
default_width = "full"
reference_highlighting = true
dataframes = "rich"
default_table_max_columns = 50

[package_management]
manager = "pip"

[completion]
activate_on_typing = true
signature_hint_on_typing = true
copilot = false

[mcp]
presets = []

[mcp.mcpServers]

[runtime]
std_stream_max_bytes = 1000000
watcher_on_save = "lazy"
default_csv_encoding = "utf-8"
output_max_bytes = 8000000
default_sql_output = "auto"
reactive_tests = true
auto_reload = "autorun"
default_auto_download = ["html"]
on_cell_change = "autorun"
auto_instantiate = true

[diagnostics]
sql_linter = true
