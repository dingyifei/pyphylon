[completion]
copilot = false
signature_hint_on_typing = true
activate_on_typing = true

[runtime]
reactive_tests = true
default_csv_encoding = "utf-8"
std_stream_max_bytes = 1000000
output_max_bytes = 8000000
default_sql_output = "auto"
default_auto_download = ["html"]
on_cell_change = "autorun"
watcher_on_save = "lazy"
auto_reload = "autorun"
auto_instantiate = true

[server]
follow_symlink = false
browser = "default"

[snippets]
custom_paths = []
include_default_snippets = true

[save]
autosave = "after_delay"
format_on_save = true
autosave_delay = 1000

[experimental]
rtc_v2 = true
storage_inspector = true
external_agents = true
server_side_pdf_export = true

[language_servers.pylsp]
enable_mypy = true
enable_ruff = true
enable_pylint = false
enabled = true
enable_pyflakes = false
enable_pydocstyle = false
enable_flake8 = false

[display]
default_table_page_size = 20
default_width = "full"
code_editor_font_size = 14
default_table_max_columns = 50
theme = "system"
reference_highlighting = true
dataframes = "rich"
cell_output = "below"

[formatting]
line_length = 88

[package_management]
manager = "pip"

[diagnostics]
sql_linter = true

[keymap]
preset = "default"

[keymap.overrides]

[ai.models]
custom_models = []
displayed_models = []

[ai.custom_providers]

[mcp]
presets = []

[mcp.mcpServers]
